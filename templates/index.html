<!DOCTYPE html>
<html>
<head>
    <title>AI Chatbot</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial; background: #f0f0f0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .container { background: white; width: 500px; height: 600px; border-radius: 15px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 5px 20px rgba(0,0,0,0.2); }
        .header { background: #007bff; color: white; padding: 20px; text-align: center; font-size: 20px; }
        #chatbox { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .user { align-self: flex-end; background: #007bff; color: white; padding: 10px 15px; border-radius: 15px 15px 0 15px; max-width: 70%; }
        .bot { align-self: flex-start; background: #e0e0e0; padding: 10px 15px; border-radius: 15px 15px 15px 0; max-width: 70%; }
        .inputbox { display: flex; padding: 15px; gap: 10px; border-top: 1px solid #eee; }
        #msg { flex: 1; padding: 10px 15px; border-radius: 25px; border: 1px solid #ccc; outline: none; font-size: 14px; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 25px; cursor: pointer; font-size: 14px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">🤖 AI Chatbot</div>
        <div id="chatbox">
            <div class="bot">Namaste! Kuch bhi poochho! 😊</div>
        </div>
        <div class="inputbox">
            <input id="msg" placeholder="Kuch bhi poochho..." onkeypress="if(event.key==='Enter') sendMsg()">
            <button onclick="sendMsg()">Send</button>
        </div>
    </div>
    <script>
        async function sendMsg() {
            const msg = document.getElementById("msg").value.trim();
            if (!msg) return;
            const chatbox = document.getElementById("chatbox");
            chatbox.innerHTML += `<div class="user">${msg}</div>`;
            document.getElementById("msg").value = "";
            chatbox.scrollTop = chatbox.scrollHeight;
            const res = await fetch("/chat", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({message: msg})
            });
            const data = await res.json();
            chatbox.innerHTML += `<div class="bot">${data.reply}</div>`;
            chatbox.scrollTop = chatbox.scrollHeight;
        }
    </script>
</body>
</html>
